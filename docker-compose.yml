version: '3.8'

services:
  math-printer:
    build: .
    container_name: math-printer
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    # 使用 bridge 网络模式（默认）
    # 注意：需要确保容器能路由到打印机 IP
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /var/run/dbus:/var/run/dbus
