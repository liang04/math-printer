version: '3.8'

services:
  math-printer:
    build: .
    container_name: math-printer
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    # 使用 host 网络模式，使容器可以访问局域网打印机
    network_mode: host
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /var/run/dbus:/var/run/dbus
